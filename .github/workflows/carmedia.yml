name: Carmedia Screenshot to Slack

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install Node
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm jq

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Capture Screenshot
        run: |
          cat << 'EOF' > screenshot.js
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            await page.goto(process.env.DASHBOARD_URL, {
              waitUntil: 'networkidle2',
              timeout: 0
            });

            await new Promise(resolve => setTimeout(resolve, 25000));

            await page.setViewport({ width: 1920, height: 1080 });

            await page.screenshot({
              path: 'screenshot.png',
              fullPage: true
            });

            await browser.close();
          })();
          EOF

          DASHBOARD_URL=${{ secrets.DASHBOARD_URL_CARMEDIA }} node screenshot.js

      # STEP 1: Get Upload URL
      - name: Get Upload URL
        id: get_url
        run: |
          FILE_SIZE=$(stat -c%s screenshot.png)

          RESPONSE=$(curl -s -X POST https://slack.com/api/files.getUploadURLExternal \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"filename\":\"screenshot.png\",\"length\":$FILE_SIZE}")

          echo "$RESPONSE"

          echo "UPLOAD_URL=$(echo $RESPONSE | jq -r '.upload_url')" >> $GITHUB_ENV
          echo "FILE_ID=$(echo $RESPONSE | jq -r '.file_id')" >> $GITHUB_ENV
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # STEP 2: Upload file
      - name: Upload Screenshot Binary
        run: |
          curl -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @screenshot.png

      # STEP 3: Complete Upload
      - name: Complete Upload to Slack
        run: |
          curl -X POST https://slack.com/api/files.completeUploadExternal \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"files\": [{\"id\": \"$FILE_ID\", \"title\": \"Carmedia Dashboard\"}],
            \"channel_id\": \"${{ secrets.SLACK_CHANNEL_ID_CARMEDIA }}\",
            \"initial_comment\": \"📊 Carmedia QC Pendency Dashboard (Auto every 3 hrs)\"
          }"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
