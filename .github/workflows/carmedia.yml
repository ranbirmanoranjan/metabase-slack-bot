name: Carmedia Screenshot to Slack

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm jq

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Capture Screenshot
        run: |
          cat << 'EOF' > screenshot.js
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            await page.goto(process.env.DASHBOARD_URL, {
              waitUntil: 'networkidle2',
              timeout: 0
            });

            await new Promise(resolve => setTimeout(resolve, 30000));

            await page.setViewport({ width: 1920, height: 1080 });

            await page.screenshot({
              path: 'screenshot.png',
              fullPage: true
            });

            await browser.close();
          })();
          EOF

          node screenshot.js
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

      - name: Verify Screenshot Exists
        run: ls -lh screenshot.png

      - name: Upload Screenshot to Slack (FINAL FIX)
        run: |
          FILE_SIZE=$(wc -c < screenshot.png)
          echo "File size: $FILE_SIZE"

          echo "{\"filename\":\"screenshot.png\",\"length\":$FILE_SIZE}" > payload.json

          RESPONSE=$(curl -s -X POST https://slack.com/api/files.getUploadURLExternal \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            --data @payload.json)

          echo "Slack response: $RESPONSE"

          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url')
          FILE_ID=$(echo "$RESPONSE" | jq -r '.file_id')

          curl -s -X POST "$UPLOAD_URL" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @screenshot.png

          echo "{\"files\":[{\"id\":\"$FILE_ID\",\"title\":\"Carmedia Dashboard\"}],\"channel_id\":\"$SLACK_CHANNEL_ID\",\"initial_comment\":\"📊 Carmedia QC Pendency Dashboard (Auto every 3 hrs)\"}" > complete.json

          curl -s -X POST https://slack.com/api/files.completeUploadExternal \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            --data @complete.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_CARMEDIA }}
