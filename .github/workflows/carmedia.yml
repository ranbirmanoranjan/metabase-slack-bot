name: Carmedia Screenshot to Slack

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install Node
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Capture Screenshot
        run: |
          cat << 'EOF' > screenshot.js
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            await page.goto(process.env.DASHBOARD_URL, {
              waitUntil: 'networkidle2',
              timeout: 0
            });

            // wait for full data load (important)
            await new Promise(resolve => setTimeout(resolve, 30000));

            await page.setViewport({ width: 1920, height: 1080 });

            await page.screenshot({
              path: 'screenshot.png',
              fullPage: true
            });

            await browser.close();
          })();
          EOF

          node screenshot.js
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

      - name: Send Screenshot to Slack
        run: |
          curl -X POST https://slack.com/api/files.upload \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -F channels=$SLACK_CHANNEL_ID \
          -F file=@screenshot.png \
          -F initial_comment="📊 Carmedia QC Pendency Dashboard (Auto every 3 hrs)"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
