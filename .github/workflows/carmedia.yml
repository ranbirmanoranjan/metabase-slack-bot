name: Carmedia Screenshot to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    # ---------------------------
    # Install Node + Puppeteer
    # ---------------------------
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install Puppeteer
      run: npm install puppeteer

    # ---------------------------
    # Capture Screenshot
    # ---------------------------
    - name: Capture Screenshot
      run: |
        cat << 'EOF' > screenshot.js
        const puppeteer = require('puppeteer');

        (async () => {
          const browser = await puppeteer.launch({
            args: ['--no-sandbox']
          });

          const page = await browser.newPage();

          await page.goto(process.env.DASHBOARD_URL, {
            waitUntil: 'networkidle2',
            timeout: 0
          });

          await page.setViewport({ width: 1920, height: 1080 });

          await new Promise(r => setTimeout(r, 5000));

          await page.screenshot({ path: 'screenshot.png', fullPage: true });

          await browser.close();
        })();
        EOF

        node screenshot.js
      env:
        DASHBOARD_URL: ${{ secrets.DASHBOARD_URL_CARMEDIA }}

    # ---------------------------
    # Verify Screenshot
    # ---------------------------
    - name: Verify Screenshot Exists
      run: |
        ls -lh screenshot.png

    # ---------------------------
    # STEP 1: Get Upload URL
    # ---------------------------
    - name: Get Upload URL
      run: |
        FILE_SIZE=$(stat -c%s screenshot.png)

        RESPONSE=$(curl -s -X POST https://slack.com/api/files.getUploadURLExternal \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @- <<EOF
        {
          "filename": "dashboard.png",
          "length": $FILE_SIZE
        }
EOF
        )

        echo "FULL RESPONSE:"
        echo "$RESPONSE"

        OK=$(echo $RESPONSE | jq -r '.ok')

        if [ "$OK" != "true" ]; then
          echo "❌ Slack API FAILED"
          exit 1
        fi

        UPLOAD_URL=$(echo $RESPONSE | jq -r '.upload_url')
        FILE_ID=$(echo $RESPONSE | jq -r '.file_id')

        echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV
        echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    # ---------------------------
    # STEP 2: Upload Binary
    # ---------------------------
    - name: Upload Screenshot Binary
      run: |
        curl -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @screenshot.png

    # ---------------------------
    # STEP 3: Complete Upload
    # ---------------------------
    - name: Complete Upload to Slack
      run: |
        curl -X POST https://slack.com/api/files.completeUploadExternal \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @- <<EOF
        {
          "files": [
            {
              "id": "$FILE_ID",
              "title": "Carmedia QC Dashboard"
            }
          ],
          "channel_id": "$SLACK_CHANNEL_ID"
        }
EOF
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_CARMEDIA }}
